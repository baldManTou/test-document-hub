<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <style>
        body { background: #f5f7fb; }
        .doc-content { background: white; border-radius: 1rem; padding: 2rem; box-shadow: 0 0.25rem 1rem rgba(0,0,0,0.05); }
        .back-link { margin-bottom: 1rem; display: inline-block; }
        .markdown-body { font-size: 1rem; line-height: 1.6; }
        .markdown-body pre { background: #f6f8fa; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
    </style>
</head>
<body class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <a href="index.html" class="back-link">&larr; 返回文档列表</a>
            <div id="docDetail" class="doc-content">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"><span class="visually-hidden">加载中...</span></div>
                </div>
            </div>
            <div id="applySection" class="mt-4 text-center" style="display: none;">
                <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#applyModal">📝 申请修改本文档</button>
            </div>
        </div>
    </div>

    <!-- 申请模态框 -->
    <div class="modal fade" id="applyModal" tabindex="-1" aria-labelledby="applyModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">提交修改申请</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="applyForm">
                        <div class="mb-3"><label for="proposedTitle" class="form-label">新标题（可选）</label><input type="text" class="form-control" id="proposedTitle"></div>
                        <div class="mb-3"><label for="proposedContent" class="form-label">新内容（支持 Markdown）</label><textarea id="proposedContent" rows="10" class="form-control"></textarea></div>
                        <div id="formError" class="text-danger mb-2"></div>
                        <button type="submit" class="btn btn-primary">提交申请</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://gwfsyslvhhkbnwjauofa.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_SWUdJhjmT05kCxheci3sNw_2H3qxIfl';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentDocId = null;
        let easyMDE = null;

        function getDocId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        async function loadDocument() {
            const docId = getDocId();
            if (!docId) {
                document.getElementById('docDetail').innerHTML = '<div class="alert alert-danger">缺少文档 ID，请从首页进入。</div>';
                return;
            }
            currentDocId = docId;
            const { data, error } = await supabaseClient
                .from('documents')
                .select('title, content')
                .eq('id', docId)
                .eq('status', 'published')
                .single();
            if (error || !data) {
                document.getElementById('docDetail').innerHTML = '<div class="alert alert-danger">文档不存在或未发布</div>';
                return;
            }
            const htmlContent = marked.parse(data.content || '');
            document.getElementById('docDetail').innerHTML = `
                <h1>${escapeHtml(data.title)}</h1>
                <div class="markdown-body mt-4">${htmlContent}</div>
            `;
        }

        async function checkUserAndShowApplyButton() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            currentUser = user;
            const applySection = document.getElementById('applySection');
            if (user) {
                applySection.style.display = 'block';
                // 延迟初始化 EasyMDE，确保元素存在且库已加载
                setTimeout(() => {
                    if (typeof EasyMDE !== 'undefined' && !easyMDE) {
                        easyMDE = new EasyMDE({ element: document.getElementById('proposedContent') });
                    } else if (typeof EasyMDE === 'undefined') {
                        console.warn('EasyMDE 加载失败，使用普通 textarea');
                    }
                }, 200);
            } else {
                applySection.style.display = 'none';
            }
        }

        async function submitApplication(event) {
            event.preventDefault();
            if (!currentDocId) {
                document.getElementById('formError').innerText = '文档 ID 丢失，请刷新页面重试';
                return;
            }
            const newTitle = document.getElementById('proposedTitle').value.trim();
            const newContent = easyMDE ? easyMDE.value() : document.getElementById('proposedContent').value;
            if (!newContent && !newTitle) {
                document.getElementById('formError').innerText = '请至少填写标题或内容修改';
                return;
            }
            const { error } = await supabaseClient
                .from('doc_change_requests')
                .insert({
                    document_id: currentDocId,
                    proposed_title: newTitle || null,
                    proposed_content: newContent || null,
                    requester_id: currentUser.id,
                    status: 'pending'
                });
            if (error) {
                document.getElementById('formError').innerText = '提交失败: ' + error.message;
            } else {
                alert('申请已提交，等待管理员审批');
                document.getElementById('proposedTitle').value = '';
                if (easyMDE) easyMDE.value('');
                else document.getElementById('proposedContent').value = '';
                bootstrap.Modal.getInstance(document.getElementById('applyModal')).hide();
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        document.getElementById('applyForm').addEventListener('submit', submitApplication);
        loadDocument().then(() => checkUserAndShowApplyButton());
    </script>
</body>
</html>
