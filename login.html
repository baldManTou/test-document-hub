<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 / 注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fb; }
        .auth-card { max-width: 450px; margin: 3rem auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-card card shadow-sm">
            <div class="card-body p-4">
                <ul class="nav nav-tabs mb-4" id="authTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">登录</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">注册</button>
                    </li>
                </ul>
                <div class="tab-content">
                    <!-- 登录表单 -->
                    <div class="tab-pane fade show active" id="login" role="tabpanel">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label">邮箱</label>
                                <input type="email" class="form-control" id="loginEmail" required>
                            </div>
                            <div class="mb-3">
                                <label for="loginPassword" class="form-label">密码</label>
                                <input type="password" class="form-control" id="loginPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">登录</button>
                            <div id="loginError" class="text-danger mt-2 small"></div>
                        </form>
                    </div>
                    <!-- 注册表单 -->
                    <div class="tab-pane fade" id="register" role="tabpanel">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="regEmail" class="form-label">邮箱</label>
                                <input type="email" class="form-control" id="regEmail" required>
                            </div>
                            <div class="mb-3">
                                <label for="regPassword" class="form-label">密码（至少6位）</label>
                                <input type="password" class="form-control" id="regPassword" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">注册</button>
                            <div id="regError" class="text-danger mt-2 small"></div>
                            <div id="regSuccess" class="text-success mt-2 small"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://gwfsyslvhhkbnwjauofa.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_SWUdJhjmT05kCxheci3sNw_2H3qxIfl';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 登录处理
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            errorDiv.innerText = '';

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                errorDiv.innerText = error.message;
            } else {
                // 登录成功，跳回首页
                window.location.href = 'index.html';
            }
        });

        // 注册处理
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const errorDiv = document.getElementById('regError');
            const successDiv = document.getElementById('regSuccess');
            errorDiv.innerText = '';
            successDiv.innerText = '';

            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) {
                errorDiv.innerText = error.message;
            } else {
                successDiv.innerText = '注册成功！请登录（可能需要邮箱验证，但你可以先去登录试试）';
                // 清空表单
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                // 可选：自动切换到登录标签
                const loginTabBtn = document.querySelector('#login-tab');
                loginTabBtn.click();
            }
        });
    </script>
</body>
</html>
